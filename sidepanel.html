<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <div class="header">
    <div class="library-selector">
      <button id="librarySelectorBtn">
        <span class="material-icons" style="font-size:18px">collections_bookmark</span>
        <span id="libraryName">Mi Biblioteca</span>
        <span class="material-icons" style="font-size:16px">expand_more</span>
      </button>
      <div id="libraryDropdown" class="library-dropdown hidden"></div>
    </div>
    <input type="text" id="searchInput" placeholder="Buscar prompts...">
    <div class="actions">
      <button id="addFolderBtn"><span class="material-icons">create_new_folder</span></button>
      <button id="addPromptBtn"><span class="material-icons">note_add</span></button>
      <button id="exportBtn"><span class="material-icons">save_alt</span></button>
      <button id="importBtn"><span class="material-icons">file_upload</span></button>
      <button id="darkModeBtn"><span class="material-icons">dark_mode</span></button>
      <div class="lang-selector">
        <button id="langBtn"><span class="material-icons">language</span></button>
        <div id="langDropdown" class="lang-dropdown hidden"></div>
      </div>
      <input type="file" id="fileInput" style="display:none" accept=".json">
    </div>

    <div id="lastModified" style="font-size: 10px; color: #888; width: 100%; text-align: right; margin-top: 6px;">
      Última actualización: --
    </div>
</div>

  <div id="libraryContainer" class="library-container">
    </div>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle">Nuevo Item</h3>
      <input type="text" id="itemTitle" placeholder="Título">
      <textarea id="itemContent" placeholder="Escribe tu prompt aquí... Usa {{variable}} para datos dinámicos."></textarea>
      <div class="modal-buttons">
        <button id="saveBtn">Guardar</button>
        <button id="cancelBtn" class="secondary">Cancelar</button>
      </div>
    </div>
  </div>
  <div class="footer">
  <span id="footerPromo">Si encuentras útil la extensión y te interesa la IA</span> <a href="https://carlosguadian.substack.com/subscribe" target="_blank" class="promo-link">
      <span id="footerSubscribe">📬 suscríbete a</span> <b>CluPad</b>
    </a>
  	<div class="credits">
    <span><span id="footerMadeBy">Hecho con ❤️ por</span> <b>Carlos Guadián Orta</b></span>
    <span class="separator">•</span>
    <a href="https://github.com/carlosguadian/universal-prompt-library" target="_blank">GitHub</a>
    </div>
  </div>

  <div id="varModal" class="modal hidden">
    <div class="modal-content var-modal-content">
      <div class="var-modal-header">
        <h3><span id="varModalTitleLabel">Variable:</span> <span id="varNameTitle"></span></h3>
        <span id="varStepIndicator" class="var-step-indicator"></span>
      </div>
      <p id="varModalDescription" class="var-modal-description">Introduce o pega el contenido para esta variable:</p>
      <div id="chipsContainer" class="history-container"></div>
      <textarea id="dynamicVarInput" spellcheck="false"></textarea>
      <div class="var-modal-actions">
        <button id="dynamicBackBtn" class="var-btn-back hidden">&#8592; Atrás</button>
        <div class="var-modal-actions-right">
          <button id="dynamicCancelBtn" class="secondary">Cancelar</button>
          <button id="dynamicConfirmBtn" class="var-btn-confirm">Insertar</button>
        </div>
      </div>
      <div class="var-modal-hint"><span id="varModalHintPrefix">Ctrl + Enter para</span> <span id="varHintAction">insertar</span></div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
